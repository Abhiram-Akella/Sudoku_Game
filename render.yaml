services:
  # Redis database for leaderboards & caching
  - type: redis
    name: sudoku-redis
    plan: free
    ipAllowList: [] # Allows only internal connections within Render for security

  # Backend Express API Web Service
  - type: web
    name: sudoku-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          name: sudoku-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGIN
        value: "" # Will be filled with the frontend URL once deployed, or left blank to allow '*' fallback

  # Frontend Vite Static Site
  - type: web
    name: sudoku-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - source: /*
        destination: /index.html
        type: rewrite
    envVars:
      - key: VITE_API_URL
        value: "" # MUST be set to: https://sudoku-backend.onrender.com/api (replace with your actual backend URL)

